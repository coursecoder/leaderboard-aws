<!DOCTYPE html>
<html>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="styles/leaderboard.css" />
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }

		body {
			background-color: #0a0a0a;
			font-family: 'Space Mono', monospace;
			padding: 16px;
		}

		canvas {
			display: block;
			border: 1px solid #2a2a2a;
			border-radius: 4px;
			background-color: #111;
			margin-bottom: 16px;
			width: 100%;
			max-width: 780px;
		}

		.game-controls {
			display: flex;
			align-items: center;
			gap: 12px;
			flex-wrap: wrap;
			max-width: 780px;
		}

		.score-input {
			flex: 1;
			min-width: 180px;
			font-family: 'Space Mono', monospace;
			font-size: 12px;
			color: #f0f0f0;
			background: #111;
			border: 1px solid #2a2a2a;
			border-radius: 4px;
			padding: 11px 16px;
			letter-spacing: 1px;
			outline: none;
			transition: border-color 0.2s ease;
		}

		.score-input::placeholder {
			color: #444;
		}

		.score-input:focus {
			border-color: #c8f000;
		}
	</style>
</head>
<body onload="startGame()">
	<canvas id="gameCanvas"></canvas>
	<div class="game-controls">
		<button class="button-32" role="button"
			onmousedown="accelerate(-0.2)"
			onmouseup="accelerate(0.05)">ACCELERATE</button>
		<button class="button-28" role="button"
			onmousedown="location.reload()">PLAY AGAIN</button>
		<input class="score-input" placeholder="Enter your name..." id="gamer-name-input" />
		<button class="button-92" role="button" id="submit-score-button">SAVE SCORE</button>
	</div>

	<script>
		var myGamePiece;
		var myObstacles = [];
		var myScore;

		function startGame() {
			myGamePiece = new component(30, 30, "#c8f000", 10, 120);
			myGamePiece.gravity = 0.05;
			myScore = new component("14px", "Space Mono", "#888888", 16, 28, "text");
			myGameArea.start();
		}

		var myGameArea = {
			canvas: document.getElementById("gameCanvas"),
			start: function () {
				this.canvas.width = 780;
				this.canvas.height = 360;
				this.context = this.canvas.getContext("2d");
				this.frameNo = 0;
				this.interval = setInterval(updateGameArea, 20);
			},
			clear: function () {
				this.context.clearRect(0, 0, this.canvas.width, this.canvas.height);
			}
		}

		function component(width, height, color, x, y, type) {
			this.type = type;
			this.score = 0;
			this.width = width;
			this.height = height;
			this.speedX = 0;
			this.speedY = 0;
			this.x = x;
			this.y = y;
			this.gravity = 0;
			this.gravitySpeed = 0;
			this.update = function () {
				ctx = myGameArea.context;
				if (this.type == "text") {
					ctx.font = this.width + " " + this.height;
					ctx.fillStyle = color;
					ctx.fillText(this.text, this.x, this.y);
				} else {
					ctx.fillStyle = color;
					ctx.fillRect(this.x, this.y, this.width, this.height);
				}
			}
			this.newPos = function () {
				this.gravitySpeed += this.gravity;
				this.x += this.speedX;
				this.y += this.speedY + this.gravitySpeed;
				this.hitBottom();
			}
			this.hitBottom = function () {
				var rockbottom = myGameArea.canvas.height - this.height;
				if (this.y > rockbottom) {
					this.y = rockbottom;
					this.gravitySpeed = 0;
				}
			}
			this.crashWith = function (otherobj) {
				var myleft = this.x;
				var myright = this.x + (this.width);
				var mytop = this.y;
				var mybottom = this.y + (this.height);
				var otherleft = otherobj.x;
				var otherright = otherobj.x + (otherobj.width);
				var othertop = otherobj.y;
				var otherbottom = otherobj.y + (otherobj.height);
				var crash = true;
				if ((mybottom < othertop) || (mytop > otherbottom) || (myright < otherleft) || (myleft > otherright)) {
					crash = false;
				}
				return crash;
			}
		}

		function updateGameArea() {
			var x, height, gap, minHeight, maxHeight, minGap, maxGap;
			for (i = 0; i < myObstacles.length; i += 1) {
				if (myGamePiece.crashWith(myObstacles[i])) {
					return;
				}
			}
			myGameArea.clear();
			myGameArea.frameNo += 1;
			if (myGameArea.frameNo == 1 || everyinterval(150)) {
				x = myGameArea.canvas.width;
				minHeight = 20;
				maxHeight = 200;
				height = Math.floor(Math.random() * (maxHeight - minHeight + 1) + minHeight);
				minGap = 50;
				maxGap = 200;
				gap = Math.floor(Math.random() * (maxGap - minGap + 1) + minGap);
				myObstacles.push(new component(10, height, "#00f0a0", x, 0));
				myObstacles.push(new component(10, x - height - gap, "#00f0a0", x, height + gap));
			}
			for (i = 0; i < myObstacles.length; i += 1) {
				myObstacles[i].x += -1;
				myObstacles[i].update();
			}
			myScore.text = "SCORE: " + myGameArea.frameNo;
			myScore.update();
			myGamePiece.newPos();
			myGamePiece.update();
		}

		function everyinterval(n) {
			if ((myGameArea.frameNo / n) % 1 == 0) { return true; }
			return false;
		}

		function accelerate(n) {
			myGamePiece.gravity = n;
		}

		// Submit score to API
		const button = document.getElementById('submit-score-button');
		button.addEventListener('click', async _ => {
			try {
				gamerData = {
					gamer_name: document.getElementById('gamer-name-input').value,
					gamer_score: myGameArea.frameNo
				}
				console.log('Gamer Data: ' + JSON.stringify(gamerData));
				const response = await fetch(window.LEADERBOARD_CONFIG.API_GW_BASE_URL_STR + "/score/submit", {
					method: 'POST',
					mode: 'no-cors',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify(gamerData)
				});
				console.log('Successfully added score to leaderboard!', response);
			} catch (err) {
				console.error(`Error: ${err}`);
			}
			document.getElementById('gamer-name-input').value = '';
		});
	</script>
	<script src="config.js"></script>
</body>
</html>
